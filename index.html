<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1>My Library</h1>
        <button id="open-modal-btn" class="fab-button">
            <span class="icon">+</span>
            <span class="text">Add New Book</span>
        </button>

        <dialog id="book-dialog">
            <form id="book-form">
                <h2>Add New Book</h2>
                <input type="text" name="title" placeholder="Title" required>
                <input type="text" name="author" placeholder="Author" required>
                <input type="number" name="pages" placeholder="Pages" required>
                <input type="number" name="year" placeholder="Year" required>
                
                <div class="dialog-actions">
                    <button type="button" id="close-modal-btn">Cancel</button>
                    <button type="submit">Add Book</button>
                </div>
             </form>
</dialog>
    </div>

    <div class="container">
    </div>

</body>
</html>
