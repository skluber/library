<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <h1>My Library</h1>
    <div class="container">

        <div class="book">

            <div class="book-info">
                <h2 class="book-title">The Hobbit</h2>
                <h3 class="book-author">J.R.R. Tolkien</h3>
                <p>Pages: 310</p>
                <p>Written in: 1937</p>
            </div>

            <div class="book-buttons">
                <button class="icon-btn delete-btn" data-id="[BOOK ID]">
                    <img src="icons/eye.svg" alt="Mark as read book">
                </button>
                <button class="icon-btn delete-btn" data-id="[BOOK ID]">
                    <img src="icons/trash.svg" alt="Delete book">
                </button>
            </div>
            
        </div>

    </div>
</body>
</html>
